###############################################################################
#  ScrollStudy — Docker Compose (local development)
#
#  Services:
#    frontend  – React/Vite dev server (hot-reload)
#    backend   – Express API (hot-reload with nodemon)
#    db        – PostgreSQL 16
#
#  Usage:
#    docker compose up --build
#    Open http://localhost:5173
#
#  For a specific condition during development:
#    http://localhost:5173/?condition=reaction&freq=5
###############################################################################

version: '3.9'

services:

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: builder          # use the build stage for dev (vite dev server)
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - '5173:5173'
    volumes:
      - ./frontend/src:/app/src   # hot-reload source files
    environment:
      - VITE_API_URL=http://localhost:4000/api
    depends_on:
      - backend

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgres://study:studypass@db:5432/scrollstudy
      - CORS_ORIGIN=http://localhost:5173
    volumes:
      - ./backend/src:/app/src
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Database ─────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: study
      POSTGRES_PASSWORD: studypass
      POSTGRES_DB: scrollstudy
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U study -d scrollstudy']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
